server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://transaction-db:5432/transaction_db
    username: transaction_user
    password: transaction_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Kafka Producer config
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      # Serialize everything as JSON strings
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Embed the type info so consumer knows which class to deserialize to
        spring.json.add.type.headers: false
      # Wait for all replicas to acknowledge (reliability over speed)
      acks: all
      # Retry up to 3 times on transient failures
      retries: 3

# JWT — must match auth-service exactly
jwt:
  secret: banking-super-secret-key-for-jwt-2024-minimum-256bits
  expiration: 86400000

# Service URLs (Docker internal DNS)
services:
  account-service:
    url: http://account-service:8082